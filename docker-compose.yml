services:
  ps-track-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ps-track-dashboard:local
    ports:
      - "3000:3000"
    networks:
      - public_zone
      - was_zone
      - db_zone
      - auth_zone
      - lms_private_zone
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_PROVIDER: ${AUTH_PROVIDER:-mock}
      REPOSITORY_PROVIDER: ${REPOSITORY_PROVIDER:-mock}
      LMS_PROVIDER: ${LMS_PROVIDER:-none}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ps_track_app:ps_track_app_password@postgres:5432/ps_track}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      LMS_DATABASE_URL: ${LMS_DATABASE_URL:-postgresql://lms_readonly:lms_readonly_password@lms-postgres:5432/lms_mock}
      LMS_POSTGRES_SSL: ${LMS_POSTGRES_SSL:-false}
      LMS_CONTENT_CATALOG_VIEW: ${LMS_CONTENT_CATALOG_VIEW:-lms_content_catalog_view}
      LMS_LEARNING_RECORD_VIEW: ${LMS_LEARNING_RECORD_VIEW:-lms_learning_record_view}
      LMS_READONLY_QUERY_LIMIT: ${LMS_READONLY_QUERY_LIMIT:-500}
      KEYCLOAK_SUB_HEADER: x-keycloak-sub
      KEYCLOAK_USERNAME_HEADER: x-keycloak-preferred-username
      KEYCLOAK_EMAIL_HEADER: x-keycloak-email
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: ps_track
      POSTGRES_USER: ps_track_app
      POSTGRES_PASSWORD: ps_track_app_password
    volumes:
      - ps-track-postgres-data:/var/lib/postgresql/data
    networks:
      - db_zone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ps_track_app -d ps_track"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lms-postgres:
    image: postgres:16-alpine
    profiles:
      - lms
    environment:
      POSTGRES_DB: lms_mock
      POSTGRES_USER: lms_mock_owner
      POSTGRES_PASSWORD: lms_mock_owner_password
    volumes:
      - ps-track-lms-postgres-data:/var/lib/postgresql/data
      - ./db/lms-mock/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lms_private_zone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_mock_owner -d lms_mock"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ps-track-postgres-data:
  ps-track-lms-postgres-data:

networks:
  public_zone:
    name: ps-track-public-zone
  was_zone:
    name: ps-track-was-zone
    internal: true
  db_zone:
    name: ps-track-db-zone
    internal: true
  auth_zone:
    name: ps-track-auth-zone
    internal: true
  lms_private_zone:
    name: ps-track-lms-private-zone
    internal: true
